<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Fotos Cloud - INACAP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .galeria-img {
            height: 260px;
            object-fit: cover;
            width: 100%;
            transition: transform 0.3s ease;
        }
        .card:hover .galeria-img { transform: scale(1.02); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">☁️ Arquitectura Cloud - Evaluación 3 y 4</span>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4 text-center">
            <div class="col">
                <h2 class="fw-bold text-secondary">Galería de Imágenes Integrada</h2>
                <p class="text-muted">Infraestructura de Alta Disponibilidad: ALB + ASG + S3 + RDS</p>
            </div>
        </div>

        <div id="galeria-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
            <div class="col-12 text-center py-5" id="loading-spinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="./gallery.js"></script> 
</body>
</html>
