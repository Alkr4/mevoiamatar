<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Fotos Cloud - INACAP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .galeria-img { height: 260px; object-fit: cover; width: 100%; transition: transform 0.3s ease; }
        .card:hover .galeria-img { transform: scale(1.02); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">☁️ Cloud Eva 3 y 4</span>
            <div class="d-flex" id="nav-buttons">
                </div>
        </div>
    </nav>

    <div class="container">
        <div id="dashboard-controls" class="mb-4 text-center hidden">
            <button class="btn btn-outline-primary me-2" onclick="mostrarSeccion('publicas')">🌎 Ver Galerías Públicas</button>
            <button class="btn btn-primary me-2" onclick="mostrarSeccion('mis-galerias')">🔒 Mis Galerías Privadas</button>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#crearGaleriaModal">➕ Nueva Galería</button>
        </div>

        <h3 id="seccion-titulo" class="fw-bold text-secondary text-center mb-4">Galerías Públicas</h3>

        <div id="galeria-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4"></div>
    </div>

    <div id="detalle-vista" class="hidden mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <button class="btn btn-secondary shadow-sm" onclick="volverDashboard()">🔙 Volver a Galerías</button>
                <h3 id="detalle-titulo" class="text-secondary fw-bold mb-0 text-center"></h3>
                <button class="btn btn-success shadow-sm" id="btn-add-photo" data-bs-toggle="modal" data-bs-target="#addPhotoModal">📸 Añadir Foto</button>
            </div>
            
            <div id="fotos-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4">
                </div>
        </div>
    </div> <div class="modal fade" id="addPhotoModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content border-0 shadow">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title fw-bold">Añadir Foto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="form-photo">
                    <input type="hidden" id="photo-gallery-id">
                    <input type="text" id="photo-title" class="form-control mb-3" placeholder="Título de la foto" required>
                    <input type="text" id="photo-desc" class="form-control mb-3" placeholder="Descripción breve">
                    
                    <div class="card p-3 mb-3 bg-light border-0">
                        <label class="form-label text-muted small fw-bold mb-1">Opción A: Subir Archivo</label>
                        <input type="file" id="photo-file" class="form-control form-control-sm" accept="image/*">
                    </div>
                    
                    <div class="text-center mb-2"><span class="badge bg-secondary">O</span></div>
                    
                    <div class="card p-3 mb-3 bg-light border-0">
                        <label class="form-label text-muted small fw-bold mb-1">Opción B: Usar URL externa</label>
                        <input type="url" id="photo-url" class="form-control form-control-sm" placeholder="https://ejemplo.com/foto.jpg">
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold">Guardar Foto</button>
                </form>
            </div>
        </div></div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Iniciar Sesión</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="form-login">
                    <input type="email" id="login-email" class="form-control mb-3" placeholder="Correo (ej: usuario@demo.cl)" required>
                    <input type="password" id="login-password" class="form-control mb-3" placeholder="Contraseña (ej: User1234)" required>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
            </div>
        </div></div>
    </div>

    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Crear Cuenta</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="form-register">
                    <input type="text" id="reg-name" class="form-control mb-3" placeholder="Nombre completo" required>
                    <input type="email" id="reg-email" class="form-control mb-3" placeholder="Correo electrónico" required>
                    <input type="password" id="reg-password" class="form-control mb-3" placeholder="Contraseña (min 6 caracteres)" required>
                    <button type="submit" class="btn btn-success w-100">Registrarse</button>
                </form>
            </div>
        </div></div>
    </div>

    <div class="modal fade" id="crearGaleriaModal" tabindex="-1">
        <div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Nueva Galería</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="form-galeria">
                    <input type="text" id="gal-titulo" class="form-control mb-3" placeholder="Título" required>
                    <input type="text" id="gal-desc" class="form-control mb-3" placeholder="Descripción">
                    <select id="gal-visibilidad" class="form-select mb-3">
                        <option value="private">Privada (Solo yo)</option>
                        <option value="public">Pública (Todos)</option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100">Crear</button>
                </form>
            </div>
        </div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./gallery.js"></script> 
</body>
</html>
